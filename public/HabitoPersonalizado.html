<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hábito Personalizado</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/habitoPersonalizado.css">
</head>
<body class="bg-personalizado min-vh-100 d-flex align-items-center justify-content-center p-3 p-md-5">

    <div class="card-habito shadow-lg w-100">
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-options p-0" id="btn-options-personalizado" aria-label="Opciones">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
        </div>
        
        <div class="text-center mb-4">
            <div class="icon-circle bg-orange-soft mx-auto mb-2">
                <i class="fa-regular fa-star text-orange"></i>
            </div>
            <h4 class="fw-bold text-dark mt-2">Hábito Personalizado</h4>
        </div>

        <div class="progress-ring ring-orange mx-auto mb-4" id="ring-veces-personalizado">
            <div class="progress-content">
                <h2 class="fw-bold mb-0 text-dark" id="contador-veces-personalizado">2/5</h2>
                <span class="text-muted small fw-semibold">veces</span>
            </div>
        </div>

        <div class="text-center mb-3">
            <span class="text-muted d-block small fw-bold text-uppercase tracking-wider">Mi hábito</span>
            <span class="text-orange fw-bold fs-6" id="habito-descripcion">Leer 20 páginas</span>
        </div>

        <div class="frecuencia-box text-center p-3 rounded-4 mb-4" id="box-frecuencia">
            <span class="text-dark d-block fw-bold small text-uppercase tracking-wider mb-1">Frecuencia</span>
            <span class="text-secondary fw-bold fs-6" id="habito-frecuencia">Diario</span>
        </div>

        <button class="btn btn-action-orange w-100 rounded-pill fw-bold py-3" id="btn-add-registro">+1 registro</button>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
