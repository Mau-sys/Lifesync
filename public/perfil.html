<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/pegrfil.css">
</head>

<body class="bg-dark">

    <div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center py-4">

        <div class="row justify-content-center w-100">

            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-body p-4">

                        <h3 class="text-center fw-bold mb-4">
                            Perfil
                        </h3>

                        <!-- Información del usuario -->
                        <div class="d-flex align-items-center mb-4">

                            <div class="rounded-circle bg-secondary d-flex justify-content-center align-items-center me-3"
                                style="width:90px;height:90px;">

                                <i class="bi bi-person-fill fs-1 text-white"></i>

                            </div>

                            <div class="flex-grow-1">

                                <h4 class="mb-1">Sarah</h4>

                                <a href="#" class="text-decoration-none small">
                                    Editar tu perfil
                                </a>

                            </div>

                        </div>

                        <!-- Opciones -->
                        <div class="list-group">

                            <a href="#"
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                                Datos personales
                                <i class="bi bi-chevron-right"></i>
                            </a>

                            <a href="#"
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                                Hábitos anclados
                                <i class="bi bi-chevron-right"></i>
                            </a>

                            <a href="#"
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                                Hábito personalizado
                                <i class="bi bi-chevron-right"></i>
                            </a>

                            <a href="#"
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                                Recordatorios
                                <i class="bi bi-chevron-right"></i>
                            </a>

                            <a href="#"
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                                Estadísticas
                                <i class="bi bi-chevron-right"></i>
                            </a>

                            <a href="#"
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                                Configuración
                                <i class="bi bi-chevron-right"></i>
                            </a>

                            <a href="#"
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 text-danger fw-semibold">
                                Cerrar sesión
                                <i class="bi bi-chevron-right"></i>
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
