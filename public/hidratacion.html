<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidratación</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <link rel="stylesheet" href="css/hidratacion.css">
</head>
<body class="bg-hidratacion min-vh-100 d-flex align-items-center justify-content-center p-3 p-md-5">

    <div class="card-habito shadow-lg w-100">
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-options p-0" id="btn-options-hidratacion" aria-label="Opciones">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
        </div>
        
        <div class="text-center mb-4">
            <div class="icon-circle bg-blue-soft mx-auto mb-2">
                <i class="fa-solid fa-droplet text-blue"></i>
            </div>
            <h4 class="fw-bold text-dark mt-2">Hidratación</h4>
        </div>

        <div class="progress-ring ring-blue mx-auto mb-4" id="ring-hidratacion">
            <div class="progress-content">
                <h2 class="fw-bold mb-0 text-dark" id="contador-vasos">4/8</h2>
                <span class="text-muted small fw-semibold">vasos</span>
            </div>
        </div>

        <div class="text-center mb-4">
            <span class="text-muted d-block small fw-bold text-uppercase tracking-wider">Meta diaria</span>
            <span class="text-blue fw-bold fs-6" id="meta-vasos">8 vasos de agua</span>
        </div>

        <div class="d-flex justify-content-center flex-wrap gap-2 mb-4 icon-row" id="contenedor-vasos-iconos">
            <i class="fa-solid fa-glass-water text-blue"></i>
            <i class="fa-solid fa-glass-water text-blue"></i>
            <i class="fa-solid fa-glass-water text-blue"></i>
            <i class="fa-solid fa-glass-water text-blue"></i>
            <i class="fa-solid fa-glass-water text-muted-glass"></i>
            <i class="fa-solid fa-glass-water text-muted-glass"></i>
            <i class="fa-solid fa-glass-water text-muted-glass"></i>
            <i class="fa-solid fa-glass-water text-muted-glass"></i>
        </div>

        <button class="btn btn-action-blue w-100 rounded-pill fw-bold py-3" id="btn-add-vaso">+1 vaso</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
