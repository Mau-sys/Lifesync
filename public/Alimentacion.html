<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentación</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <link rel="stylesheet" href="css/Alimentacion.css">
</head>
<body class="bg-alimentacion min-vh-100 d-flex align-items-center justify-content-center p-3 p-md-5">

    <div class="card-habito shadow-lg w-100">
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-options p-0" id="btn-options-alimentacion" aria-label="Opciones">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
        </div>
        
        <div class="text-center mb-4">
            <div class="icon-circle bg-green-soft mx-auto mb-2">
                <i class="fa-solid fa-apple-whole text-green"></i>
            </div>
            <h4 class="fw-bold text-dark mt-2">Alimentación</h4>
        </div>

        <div class="progress-ring ring-green mx-auto mb-4" id="ring-comidas">
            <div class="progress-content">
                <h2 class="fw-bold mb-0 text-dark" id="contador-comidas">2/3</h2>
                <span class="text-muted small fw-semibold">comidas</span>
            </div>
        </div>

        <div class="text-center mb-4">
            <span class="text-muted d-block small fw-bold text-uppercase tracking-wider">Meta diaria</span>
            <span class="text-green fw-bold fs-6" id="meta-comidas">3 comidas al día</span>
        </div>

        <div class="d-flex justify-content-around align-items-center mb-4 comidainfo-container p-3 rounded-4" id="lista-comidas">
            <div class="text-center">
                <i class="fa-solid fa-cloud-sun text-green fs-4 mb-1"></i>
                <span class="d-block text-secondary small fw-bold">Desayuno</span>
            </div>
            <div class="text-center">
                <i class="fa-solid fa-sun text-green fs-4 mb-1"></i>
                <span class="d-block text-secondary small fw-bold">Almuerzo</span>
            </div>
            <div class="text-center">
                <i class="fa-solid fa-moon text-green fs-4 mb-1"></i>
                <span class="d-block text-secondary small fw-bold">Cena</span>
            </div>
        </div>

        <button class="btn btn-action-green w-100 rounded-pill fw-bold py-3" id="btn-add-comida">+1 comida</button>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
