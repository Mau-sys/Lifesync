<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="LifeSync - Plataforma para el seguimiento de hábitos saludables">

    <title>LifeSync | Iniciar sesión</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/inicio-sesion.css">

</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <div class="logo-container">

                <img
                    id="logo"
                    src="Logo-LS-N.png"
                    alt="Logo LifeSync"
                    class="logo">

            </div>

            <form
                id="loginForm"
                class="login-form"
                action=""
                method="post">

                <div class="input-group">

                    <label for="correo">

                        Correo electrónico

                    </label>

                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ingresa tu correo electrónico"
                        autocomplete="email"
                        required>

                </div>

                <div class="input-group">

                    <label for="password">

                        Contraseña

                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contraseña"
                        autocomplete="current-password"
                        required>

                </div>

                <p
                    id="mensajeError"
                    class="mensaje-error">

                </p>

                <a
                    href="../Recuperar-Contraseña/Recuperar-contraseña.html"
                    id="recuperarPassword"
                    class="forgot-password">

                    ¿Olvidaste tu contraseña?

                </a>

                <button
                    type="submit"
                    id="btnLogin"
                    class="btn-primary">

                    Iniciar sesión

                </button>

            </form>

            <div class="social-login">

                <p>

                    O continúa con

                </p>

                <div class="social-buttons">

                    <button
                        type="button"
                        id="googleLogin"
                        class="social-button">

                        <img
                            src="Logo-G.png"
                            alt="Google">

                    </button>

                    <button
                        type="button"
                        id="appleLogin"
                        class="social-button">

                        <img
                            src="Logo-A.png"
                            alt="Apple">

                    </button>

                </div>

            </div>

            <p class="register-link">

                ¿No tienes una cuenta?

                <a
                    href="../Registrarse/Registro.html">

                    Regístrate

                </a>

            </p>

        </section>

    </main>

    <script src="../js/login.js"></script>

</body>

</html>
