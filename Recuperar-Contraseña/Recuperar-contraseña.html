<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Recupera el acceso a tu cuenta de LifeSync">

    <title>LifeSync | Recuperar contraseña</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/recuperar-contraseña.css">

</head>

<body>

    <main class="recovery-page">

        <section class="recovery-card">

            <a
                href="../Inicio-Sesion/Inicio-sesion.html"
                class="btn-back">

                ← Volver

            </a>

            <header class="recovery-header">

                <h1>

                    ¿Olvidaste tu contraseña?

                </h1>

                <p>

                    Ingresa el correo electrónico asociado a tu cuenta para recuperar el acceso a LifeSync.

                </p>

            </header>

            <form
                id="recuperarForm"
                class="recovery-form">

                <div class="input-group">

                    <label for="correo">

                        Correo electrónico

                    </label>

                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ingresa tu correo electrónico"
                        autocomplete="email"
                        required>

                </div>

                <p
                    id="mensajeRecuperacion"
                    class="mensaje">

                </p>

                <button
                    type="submit"
                    id="btnRecuperar"
                    class="btn-primary">

                    Enviar enlace de recuperación

                </button>

            </form>

            <p class="login-link">

                ¿Recuerdas tu contraseña?

                <a
                    href="../Inicio-Sesion/Inicio-sesion.html">

                    Inicia sesión

                </a>

            </p>

        </section>

    </main>

    <script src="../js/recuperar-contraseña.js"></script>

</body>

</html>
