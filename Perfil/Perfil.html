<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Perfil del usuario - LifeSync">

    <title>LifeSync | Perfil</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/perfil.css">

</head>

<body>

    <main class="perfil-container">

        <section class="perfil-superior">

            <div class="perfil-info">

                <img
                    src="Perfil.png"
                    alt="Foto de perfil"
                    id="fotoPerfil"
                    class="foto-perfil">

                <div class="datos-perfil">

                    <h1 id="nombreUsuario"></h1>

                    <a
                        href="Datos-personales/Datos-personales.html"
                        id="editarPerfil"
                        class="editar-perfil">

                        Editar tu perfil

                    </a>

                </div>

            </div>

        </section>

        <nav class="menu-perfil">

            <a
                href="Datos-personales/Datos-personales.html"
                class="opcion-menu"
                id="btnDatos">

                <span>Datos personales</span>

                <span>›</span>

            </a>

            <a
                href="Habitos-personalizados/habitos-personalizados.html"
                class="opcion-menu"
                id="btnHabitoPersonalizado">

                <span>Hábitos personalizados</span>

                <span>›</span>

            </a>

            <a
                href="Recordatorios/Recordatorios.html"
                class="opcion-menu"
                id="btnRecordatorios">

                <span>Recordatorios</span>

                <span>›</span>

            </a>

            <a
                href="Estadisticas/Estadisticas.html"
                class="opcion-menu"
                id="btnEstadisticas">

                <span>Estadísticas</span>

                <span>›</span>

            </a>

            <a
                href="Configuracion/Configuracion.html"
                class="opcion-menu"
                id="btnConfiguracion">

                <span>Configuración</span>

                <span>›</span>

            </a>

        </nav>

        <section class="cerrar-sesion">

            <button
                type="button"
                id="btnCerrarSesion"
                class="btn-cerrar">

                Cerrar sesión

            </button>

        </section>

    </main>

    <script src="../js/perfil.js"></script>

</body>

</html>
