<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Seguimiento de la categoría Registro Académico en LifeSync">

    <title>LifeSync | Registro Académico</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/registro-academico.css">

</head>

<body>

    <main class="contenedor-categoria">

        <header class="encabezado">

            <a
                href="../Categorias/Categorias.html"
                class="volver">

                ← Volver

            </a>

            <button
                type="button"
                id="btnOpciones"
                class="btn-opciones">

                ⋮

            </button>

        </header>

        <section class="encabezado-categoria">

            <img
                id="iconoCategoria"
                src="R-Academ.png"
                alt="Registro Académico">

            <div>

                <h1 id="nombreCategoria"></h1>

                <p id="descripcionCategoria"></p>

            </div>

        </section>

        <section class="progreso">

            <div
                id="graficaProgreso"
                class="grafica-progreso">

            </div>

        </section>

        <section class="informacion">

            <div
                id="resumenCategoria"
                class="resumen-categoria">

            </div>

        </section>

        <section
            id="listaObjetivos"
            class="lista-objetivos">

        </section>

        <section class="acciones">

            <button
                type="button"
                id="btnRegistrar"
                class="btn-principal">

            </button>

            <button
                type="button"
                id="btnEditar"
                class="btn-secundario">

            </button>

        </section>

        <section class="historial">

            <h2 id="tituloHistorial"></h2>

            <div
                id="listaRegistros"
                class="lista-registros">

            </div>

        </section>

    </main>

    <script src="../js/registro-academico.js"></script>

</body>

</html>
